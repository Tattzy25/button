<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Button</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: transparent;
    }
    .cssbuttons-io {
      position: relative;
      font-family: inherit;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 0.05em;
      border-radius: 0.8em;
      cursor: pointer;
      border: none;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      color: ghostwhite;
      overflow: hidden;
    }
    .cssbuttons-io svg { width: 1.2em; height: 1.2em; margin-right: 0.5em; }
    .cssbuttons-io span {
      position: relative;
      z-index: 10;
      transition: color 0.4s;
      display: inline-flex;
      align-items: center;
      padding: 0.8em 1.2em 0.8em 1.05em;
    }
    .cssbuttons-io::before {
      content: "";
      position: absolute;
      top: 0; left: -10%;
      width: 120%; height: 100%;
      background: #000;
      transform: skew(30deg);
      transition: transform 0.4s cubic-bezier(0.3, 1, 0.8, 1);
      z-index: 0;
    }
    .cssbuttons-io:hover::before { transform: translate3d(100%, 0, 0); }
    .cssbuttons-io:active { transform: scale(0.95); }
    .cssbuttons-io:disabled { opacity: 0.6; cursor: not-allowed; }
    .cssbuttons-io.loading span::after {
      content: "";
      display: inline-block;
      width: 0.8em; height: 0.8em;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      margin-left: 0.6em;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <button class="cssbuttons-io" id="codeBtn" onclick="callEndpoint()">
    <span>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h24v24H0z" fill="none"></path>
        <path d="M24 12l-5.657 5.657-1.414-1.414L21.172 12l-4.243-4.243 1.414-1.414L24 12zM2.828 12l4.243 4.243-1.414 1.414L0 12l5.657-5.657L7.07 7.757 2.828 12zm6.96 9H7.66l6.552-18h2.128L9.788 21z" fill="currentColor"></path>
      </svg>
      Code
    </span>
  </button>

  <script>
    const ENDPOINT_URL = "https://flow.zoho.com/916614704/flow/webhook/incoming?zapikey=1001.5f14221452505497e566ce32b2d990dc.3959af0b4aa2a82d23a89186e31de667&isdebug=true";

    async function callEndpoint() {
      const btn = document.getElementById("codeBtn");
      btn.disabled = true;
      btn.classList.add("loading");

      const payload = {
        source_id:      "REPLACE",   // <-- map your value
        customer_id:    "REPLACE",   // <-- map your value
        version:        "REPLACE",   // <-- map your value
        model:          "REPLACE",   // <-- map your value
        trigger:        "REPLACE",   // <-- map your value
        amount:         "REPLACE",   // <-- map your value
        previous_value: "REPLACE",   // <-- map your value
        new_value:      "REPLACE",   // <-- map your value
        timestamp:      new Date().toISOString()
      };

      try {
        const response = await fetch(ENDPOINT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json().catch(() => response.text());
        console.log("✅", data);

      } catch (err) {
        console.error("❌", err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove("loading");
      }
    }
  </script>

</body>
</html>
