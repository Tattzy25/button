<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Button UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; } 
        body { display: flex; gap: 20px; align-items: center; justify-content: center; min-height: 100vh; background: transparent; }

        .cssbuttons-io { 
            position: relative; 
            font-family: inherit; 
            font-weight: 500; 
            font-size: 18px; 
            letter-spacing: 0.05em; 
            border-radius: 0.8em; 
            cursor: pointer; 
            border: none; 
            background: linear-gradient(to right, #8e2de2, #4a00e0); 
            color: ghostwhite; 
            overflow: hidden; 
        } 
        
        .cssbuttons-io svg { 
            width: 1.2em; height: 1.2em; margin-right: 0.5em; 
        } 
        
        .cssbuttons-io span { 
            position: relative; 
            z-index: 10; 
            transition: color 0.4s; 
            display: inline-flex; 
            align-items: center; 
            padding: 0.8em 1.2em 0.8em 1.05em; 
        } 
        
        .cssbuttons-io::before, .cssbuttons-io::after { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; 
        } 
        
        .cssbuttons-io::before { 
            content: ""; background: #000; width: 120%; left: -10%; transform: skew(30deg); transition: transform 0.4s cubic-bezier(0.3, 1, 0.8, 1); 
        } 
        
        .cssbuttons-io:hover::before { 
            transform: translate3d(100%, 0, 0); 
        } 
        
        .cssbuttons-io:active { 
            transform: scale(0.95); 
        } 

        .cssbuttons-io.loading span::after { 
            content: ""; display: inline-block; width: 0.8em; height: 0.8em; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; margin-left: 0.6em; animation: spin 0.6s linear infinite; 
        } 
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <button class="cssbuttons-io" onclick="callZohoFlow(this, 'Button_1')"> 
        <span>
            <svg viewBox="0 0 24 24" xmlns="http://w3.org"> 
                <path d="M0 0h24v24H0z" fill="none"></path> 
                <path d="M24 12l-5.657 5.657-1.414-1.414L21.172 12l-4.243-4.243 1.414-1.414L24 12zM2.828 12l4.243 4.243-1.414 1.414L0 12l5.657-5.657L7.07 7.757 2.828 12zm6.96 9H7.66l6.552-18h2.128L9.788 21z" fill="currentColor"></path> 
            </svg> Code
        </span> 
    </button> 

    <button class="cssbuttons-io" onclick="callZohoFlow(this, 'Button_2')"> 
        <span>
            <svg viewBox="0 0 24 24" xmlns="http://w3.org"> 
                <path d="M0 0h24v24H0z" fill="none"></path> 
                <path d="M24 12l-5.657 5.657-1.414-1.414L21.172 12l-4.243-4.243 1.414-1.414L24 12zM2.828 12l4.243 4.243-1.414 1.414L0 12l5.657-5.657L7.07 7.757 2.828 12zm6.96 9H7.66l6.552-18h2.128L9.788 21z" fill="currentColor"></path> 
            </svg> Code
        </span> 
    </button>

    <script>
        const ENDPOINT_URL = "https://flow.zoho.com/916614704/flow/webhook/incoming?zapikey=1001.056cce6bef5f18c7cef879e64d6b10c8.86bd8d4d9b305a711aa47a7de38a7d45&isdebug=true";

        window.TrackingState = {
            SOURCE_ID: "",
            CUSTOMER_ID: "",
            VERSION: "",
            MODEL: "",
            TRIGGER: "",
            AMOUNT: "",
            PREVIOUS_VALUE: "",
            NEW_VALUE: ""
        };

        async function callZohoFlow(btnElement, buttonIdentifier) {
            btnElement.disabled = true;
            btnElement.classList.add("loading");

            const DYNAMIC_HEADERS = {
                "Content-Type": "application/json",
                "SOURCE_ID": String(window.TrackingState.SOURCE_ID),
                "CUSTOMER_ID": String(window.TrackingState.CUSTOMER_ID),
                "VERSION": String(window.TrackingState.VERSION),
                "MODEL": String(window.TrackingState.MODEL),
                "TRIGGER": String(window.TrackingState.TRIGGER || buttonIdentifier),
                "AMOUNT": String(window.TrackingState.AMOUNT),
                "PREVIOUS_VALUE": String(window.TrackingState.PREVIOUS_VALUE),
                "NEW_VALUE": String(window.TrackingState.NEW_VALUE),
                "TIMESTAMP": new Date().toISOString()
            };

            try {
                const response = await fetch(ENDPOINT_URL, {
                    method: "POST",
                    headers: DYNAMIC_HEADERS,
                    body: JSON.stringify({})
                });

                if (response.ok) {
                    console.log(`Success: Dispatched ${buttonIdentifier}`);
                } else {
                    console.error("Server Error:", response.status);
                }
            } catch (err) {
                console.error("Network Error:", err);
            } finally {
                btnElement.disabled = false;
                btnElement.classList.remove("loading");
            }
        }
    </script>
</body>
</html>
